name: Deploy to GitHub Pages

on:
  push:
    branches:
      - nuxt

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate
        env:
          # Store your token as a repository secret named VITE_MAPBOX_TOKEN
          VITE_MAPBOX_TOKEN: pk.eyJ1Ijoiampva290c2EiLCJhIjoiY2x6cDZwazF6MGZ6YjJqczNhN2NhbzhqaSJ9.oQGDEtkct__f_mDVP5Dmew

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          cname: athenscityguideredbull.com 
